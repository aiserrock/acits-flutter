name: CI

# Two triggers, two purposes:
#   pull_request -> quality gate (lint/analyse/test/build) before merge.
#   push tags "v*" -> release: build everything, publish the GitHub Release,
#     deploy the web PWA.
# A plain push to main/develop (no tag) runs nothing — merging already means
# the PR build passed.
on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Matches the FVM pin in .fvmrc (Dart 3.12, Flutter 3.44.x). CI pins the SDK
# directly via subosito/flutter-action — FVM's install step is fragile here
# and breaks the action's caching.
env:
  FLUTTER_VERSION: "3.44.0"

# One job per pipeline stage (prepare -> lint/analyse/test -> build ->
# release -> notify) so a failure shows up as its own named check instead of
# being buried in a single job's step list.
jobs:
  ##### prepare #####
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Firebase configs are gitignored; materialise them from the committed
      # *.example templates so codegen/analysis/tests can run.
      - name: Provision Firebase placeholders
        run: |
          cp android/app/src/dev/google-services.json.example android/app/src/dev/google-services.json
          cp android/app/src/prod/google-services.json.example android/app/src/prod/google-services.json
          cp ios/Runner/GoogleService-Info.plist.example ios/Runner/GoogleService-Info.plist

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # Share the exact post-codegen output with every downstream job instead
      # of each re-running build_runner (generator patch versions can drift).
      # Only lib/, test/ and pubspec.lock actually change from codegen —
      # archiving the whole tree would pull in multi-GB caches full of files
      # that mutate mid-read and make tar fail.
      - name: Archive workspace
        run: tar -czf workspace.tar.gz lib test pubspec.lock

      - uses: actions/upload-artifact@v7
        with:
          name: workspace
          path: workspace.tar.gz
          retention-days: 1

  ##### lint #####
  lint:
    name: Lint
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/ and test/ on top of the checkout.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      # dart format only parses syntax, no package resolution — so no
      # `flutter pub get` here, just the SDK to get a `dart` binary.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Format only hand-written code (line length 100). Generated files
      # (*.g.dart, *.config.dart, *.swagger.dart, *.chopper.dart, *.gen.dart,
      # locale_keys) are excluded: their exact formatting depends on generator
      # patch versions and is not something contributors hand-maintain.
      - name: Verify formatting
        run: |
          files=$(find lib test -name '*.dart' \
            ! -name '*.g.dart' \
            ! -name '*.config.dart' \
            ! -name '*.swagger.dart' \
            ! -name '*.chopper.dart' \
            ! -name '*.gen.dart' \
            ! -name 'locale_keys.g.dart')
          dart format --output=none --set-exit-if-changed -l 100 $files

  ##### analyse #####
  analyse:
    name: Analyse
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/ and test/ on top of the checkout.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyse
        run: flutter analyze

  ##### test #####
  test:
    name: Test
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/ and test/ on top of the checkout.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  ##### build #####
  # Android/iOS builds only run where they earn their cost: on PRs (catch a
  # broken build before merge) and on a release tag (produce the artifact
  # that gets attached to the GitHub Release). A plain push to main/develop
  # doesn't build them — merging already implies the PR build passed.
  build-android:
    name: Build Android (dev APK)
    needs: [lint, analyse, test]
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # Full checkout for android/ (Gradle config, etc.) — the workspace
      # artifact only carries lib/test/pubspec.lock, not the whole tree.
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/, test/ and resolved pubspec.lock so
      # this build uses the exact same generated code as lint/analyse/test.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Firebase configs are gitignored; materialise them from the committed
      # *.example templates, then override with real secrets if configured.
      - name: Provision Firebase config
        env:
          GOOGLE_SERVICES_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
          GOOGLE_SERVICES_PROD: ${{ secrets.GOOGLE_SERVICES_JSON_PROD }}
        run: |
          cp android/app/src/dev/google-services.json.example android/app/src/dev/google-services.json
          cp android/app/src/prod/google-services.json.example android/app/src/prod/google-services.json
          if [ -n "$GOOGLE_SERVICES_DEV" ]; then
            echo "$GOOGLE_SERVICES_DEV" | base64 --decode > android/app/src/dev/google-services.json
          fi
          if [ -n "$GOOGLE_SERVICES_PROD" ]; then
            echo "$GOOGLE_SERVICES_PROD" | base64 --decode > android/app/src/prod/google-services.json
          fi

      # Debug build so it is signed with the debug keystore (no release
      # signing secrets needed in CI). --build-number is stamped from the
      # workflow run number so every CI build gets a unique, increasing
      # build number instead of the static one committed in pubspec.yaml.
      - name: Build dev APK
        run: flutter build apk --debug --flavor dev --target test/dev/main.dart --build-number=$GITHUB_RUN_NUMBER

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: app-dev-debug-apk
          path: build/app/outputs/flutter-apk/app-dev-debug.apk
          if-no-files-found: error
          retention-days: 14

  build-ios:
    name: Build iOS (unsigned)
    needs: [lint, analyse, test]
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      # Full checkout for ios/ (Xcode project, Podfile, etc.) — the workspace
      # artifact only carries lib/test/pubspec.lock, not the whole tree.
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/, test/ and resolved pubspec.lock so
      # this build uses the exact same generated code as lint/analyse/test.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Cache Swift Package Manager artifacts (SPM is default in Flutter 3.44).
      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Firebase config is gitignored; materialise it from the committed
      # *.example template, then override with the real secret if configured.
      - name: Provision Firebase config
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          cp ios/Runner/GoogleService-Info.plist.example ios/Runner/GoogleService-Info.plist
          if [ -n "$GOOGLE_SERVICE_INFO" ]; then
            echo "$GOOGLE_SERVICE_INFO" | base64 --decode > ios/Runner/GoogleService-Info.plist
          fi

      # --build-number is stamped from the workflow run number, same as the
      # Android build, so both artifacts from one CI run carry a matching,
      # unique build number instead of the static one in pubspec.yaml.
      - name: Build iOS (no codesign, dev flavor)
        run: flutter build ios --debug --no-codesign --flavor dev --target test/dev/main.dart --build-number=$GITHUB_RUN_NUMBER

      - name: Package .app
        run: |
          APP_PATH=$(find build/ios -name '*.app' -type d | head -1)
          test -n "$APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -ry "$GITHUB_WORKSPACE/Runner-dev-debug.app.zip" "$(basename "$APP_PATH")"

      - uses: actions/upload-artifact@v7
        with:
          name: app-dev-debug-ios
          path: Runner-dev-debug.app.zip
          if-no-files-found: error
          retention-days: 14

  ##### build web (tags only) #####
  # Deploys the prod web build to GitHub Pages so every release gets a
  # browsable PWA without needing a separate server.
  build-web:
    name: Build & deploy web (GitHub Pages)
    needs: [lint, analyse, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Full checkout for web/ (index.html, manifest.json, icons).
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/, test/ and resolved pubspec.lock so
      # this build uses the exact same generated code as lint/analyse/test.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Firebase config is gitignored; materialise it from the committed
      # *.example template, then override with the real secret if configured.
      - name: Provision Firebase config
        env:
          GOOGLE_SERVICES_PROD: ${{ secrets.GOOGLE_SERVICES_JSON_PROD }}
        run: |
          cp android/app/src/prod/google-services.json.example android/app/src/prod/google-services.json
          if [ -n "$GOOGLE_SERVICES_PROD" ]; then
            echo "$GOOGLE_SERVICES_PROD" | base64 --decode > android/app/src/prod/google-services.json
          fi

      # prod flavor (lib/main.dart) — the same entry point used for release
      # Android/iOS builds. --base-href matches the Pages project path
      # (https://<owner>.github.io/<repo>/) so asset/router URLs resolve
      # correctly when served from a subpath instead of the domain root.
      - name: Build web (prod)
        run: |
          flutter build web -t lib/main.dart --release \
            --base-href "/${GITHUB_REPOSITORY#*/}/"

      - uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  ##### release (tags only) #####
  # Publishes the GitHub Release: attaches the dev APK built above and writes
  # release notes from CHANGELOG.md. Pushing a tag is the whole release
  # process — no manual release-page editing.
  release:
    name: Publish GitHub Release
    needs: [build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: app-dev-debug-apk
          path: release-assets

      # Release notes are an extract of CHANGELOG.md, nothing invented here:
      # take the section for this tag's version, keep only the "- " bullet
      # lines (drop the ### Added/Changed/Fixed subheadings), no emoji, no
      # generated commentary.
      - name: Extract changelog section
        id: changelog
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          notes=$(awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "([+ ]|\\])" { found=1; next }
            found && /^## \[/ { exit }
            found && /^- / { print }
          ' CHANGELOG.md)

          if [ -z "$notes" ]; then
            echo "No CHANGELOG.md section found for version $tag" >&2
            exit 1
          fi

          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-assets/app-dev-debug.apk \
            --title "$GITHUB_REF_NAME" \
            --notes "$NOTES"

  ##### notify #####
  # Runs on every non-PR trigger, i.e. only a v* tag push (or a manual
  # workflow_dispatch) — PRs don't post to Telegram.
  notify:
    name: Notify Telegram
    needs: [prepare, lint, analyse, test, build-android, build-ios, build-web, release]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 8

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULT_PREPARE: ${{ needs.prepare.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_ANALYSE: ${{ needs.analyse.result }}
          RESULT_TEST: ${{ needs.test.result }}
          RESULT_ANDROID: ${{ needs.build-android.result }}
          RESULT_IOS: ${{ needs.build-ios.result }}
          RESULT_WEB: ${{ needs.build-web.result }}
          RESULT_RELEASE: ${{ needs.release.result }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured — skipping notification."
            exit 0
          fi

          # Version name from pubspec.yaml + the actual build number this run
          # stamped onto the APK/IPA (flutter build ... --build-number=$GITHUB_RUN_NUMBER),
          # not the stale +N suffix committed in pubspec.yaml.
          version_name=$(grep -E '^version:' pubspec.yaml | sed -E 's/version: *([0-9.]+)\+.*/\1/')
          version="${version_name}+${GITHUB_RUN_NUMBER}"
          # Strip whichever ref prefix applies (tag push, or a manual
          # workflow_dispatch off a branch).
          ref="${GITHUB_REF#refs/tags/}"
          ref="${ref#refs/heads/}"
          short_sha="${GITHUB_SHA:0:8}"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          # Plain text on purpose: commit subjects are arbitrary user text and
          # can contain unpaired *"/`_` characters, which breaks Telegram's
          # Markdown entity parser and silently drops the whole message
          # (sendMessage replies 400 "can't parse entities"). No parse_mode
          # avoids that failure mode entirely.
          changelog=$(git log -8 --pretty=format:'- %ad %an | %s' --date=short)

          # build-android/build-ios/build-web/release are gated to PR/tag
          # (see each job's `if:`); "skipped" is their expected result here,
          # not a failure — only "failure"/"cancelled" should turn this red.
          is_bad() { [ "$1" = "failure" ] || [ "$1" = "cancelled" ]; }
          if [ "$RESULT_PREPARE" = "success" ] && [ "$RESULT_LINT" = "success" ] && \
             [ "$RESULT_ANALYSE" = "success" ] && [ "$RESULT_TEST" = "success" ] && \
             ! is_bad "$RESULT_ANDROID" && ! is_bad "$RESULT_IOS" && \
             ! is_bad "$RESULT_WEB" && ! is_bad "$RESULT_RELEASE"; then
            status_line="✅ Build succeeded"
          else
            status_line="❌ Build failed (prepare: $RESULT_PREPARE, lint: $RESULT_LINT, analyse: $RESULT_ANALYSE, test: $RESULT_TEST, android: $RESULT_ANDROID, ios: $RESULT_IOS, web: $RESULT_WEB, release: $RESULT_RELEASE)"
          fi

          text=$(printf '%s\nacits_flutter v%s\nRef: %s\nCommit: %s\nRun: %s\n\nChangelog:\n%s' \
            "$status_line" "$version" "$ref" "$short_sha" "$run_url" "$changelog")

          response=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${text}")
          echo "$response"
          echo "$response" | grep -q '"ok":true' || { echo "Telegram API call failed"; exit 1; }
