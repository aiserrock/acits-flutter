name: CI

# Triggers:
#   pull_request -> quality gate (lint/analyse/test/build dev) before merge.
#   push to develop (i.e. a merged PR) -> deploy the dev web PWA to GitHub
#     Pages, refreshing the dev stand. Deploy runs post-merge (not from the PR
#     context) because the github-pages environment only allows deploys from
#     the develop branch, not from refs/pull/*/merge.
#   push tags "v*" -> build the signed prod APK/IPA artifacts. Prod server
#     deployment (prod flavor) is added here later.
on:
  push:
    branches: [develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# GitHub Pages is a single per-repo site. Serialise Pages deploys so back-to-back
# merges into develop don't race; the newest deploy wins the stand.
concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: false

# Matches the FVM pin in .fvmrc (Dart 3.12, Flutter 3.44.x). CI pins the SDK
# directly via subosito/flutter-action — FVM's install step is fragile here
# and breaks the action's caching.
env:
  FLUTTER_VERSION: "3.44.0"

# One job per pipeline stage (prepare -> lint/analyse/test -> build ->
# deploy web -> notify) so a failure shows up as its own named check instead
# of being buried in a single job's step list.
jobs:
  ##### prepare #####
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Firebase configs are gitignored; materialise them from the committed
      # *.example templates so codegen/analysis/tests can run. iOS plists are
      # per-flavor (ios/flavors/) and only needed at build time (bundle-service
      # build phase), not for codegen — so not provisioned here.
      - name: Provision Firebase placeholders
        run: |
          cp android/app/src/dev/google-services.json.example android/app/src/dev/google-services.json
          cp android/app/src/prod/google-services.json.example android/app/src/prod/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # Share the exact post-codegen output with every downstream job instead
      # of each re-running build_runner (generator patch versions can drift).
      # Only lib/, test/ and pubspec.lock actually change from codegen —
      # archiving the whole tree would pull in multi-GB caches full of files
      # that mutate mid-read and make tar fail.
      - name: Archive workspace
        run: tar -czf workspace.tar.gz lib test pubspec.lock

      - uses: actions/upload-artifact@v7
        with:
          name: workspace
          path: workspace.tar.gz
          retention-days: 1

  # lint/analyse/test are the PR/tag quality gate. A push to develop only
  # redeploys the PWA (that PR already passed the gate at review time), so
  # skip them there.
  ##### lint #####
  lint:
    name: Lint
    needs: prepare
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/ and test/ on top of the checkout.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      # dart format only parses syntax, no package resolution — so no
      # `flutter pub get` here, just the SDK to get a `dart` binary.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Format only hand-written code (line length 120). Generated files
      # (*.g.dart, *.config.dart, *.swagger.dart, *.chopper.dart, *.gen.dart,
      # locale_keys, firebase_options) are excluded: their exact formatting
      # depends on generator/CLI versions and isn't hand-maintained.
      - name: Verify formatting
        run: |
          files=$(find lib test -name '*.dart' \
            ! -name '*.g.dart' \
            ! -name '*.config.dart' \
            ! -name '*.swagger.dart' \
            ! -name '*.chopper.dart' \
            ! -name '*.gen.dart' \
            ! -name 'locale_keys.g.dart' \
            ! -name 'firebase_options.dart')
          dart format --output=none --set-exit-if-changed -l 120 $files

  ##### analyse #####
  analyse:
    name: Analyse
    needs: prepare
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/ and test/ on top of the checkout.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyse
        run: flutter analyze

  ##### test #####
  test:
    name: Test
    needs: prepare
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/ and test/ on top of the checkout.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  ##### build #####
  # PR builds the dev flavor; a v* tag builds prod. Both are signed release
  # builds (release keystore from secrets). A plain push to main/develop
  # builds nothing — merging already implies the PR build passed.
  build-android:
    name: Build Android (signed release)
    needs: [lint, analyse, test]
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # Full checkout for android/ (Gradle config, etc.) — the workspace
      # artifact only carries lib/test/pubspec.lock, not the whole tree.
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/, test/ and resolved pubspec.lock so
      # this build uses the exact same generated code as lint/analyse/test.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      # dev on PR, prod on a tag. Downstream steps read these outputs.
      - name: Select flavor
        id: flavor
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=dev"   >> "$GITHUB_OUTPUT"
            echo "target=test/dev/main.dart" >> "$GITHUB_OUTPUT"
          else
            echo "name=prod"  >> "$GITHUB_OUTPUT"
            echo "target=lib/main.dart" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Firebase configs are gitignored; materialise them from the committed
      # *.example templates, then override with real secrets if configured.
      - name: Provision Firebase config
        env:
          GOOGLE_SERVICES_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
          GOOGLE_SERVICES_PROD: ${{ secrets.GOOGLE_SERVICES_JSON_PROD }}
        run: |
          cp android/app/src/dev/google-services.json.example android/app/src/dev/google-services.json
          cp android/app/src/prod/google-services.json.example android/app/src/prod/google-services.json
          if [ -n "$GOOGLE_SERVICES_DEV" ]; then
            echo "$GOOGLE_SERVICES_DEV" | base64 --decode > android/app/src/dev/google-services.json
          fi
          if [ -n "$GOOGLE_SERVICES_PROD" ]; then
            echo "$GOOGLE_SERVICES_PROD" | base64 --decode > android/app/src/prod/google-services.json
          fi

      # Decode the release keystore and write key.properties, which
      # keystoreConfig.gradle reads to sign the release build.
      - name: Provision release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not set — cannot sign release build." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore/release.jks
          cat > android/keystore/key.properties <<EOF
          storeFile=../keystore/release.jks
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          EOF

      # Signed release build. --build-number is stamped from the run number so
      # every CI build gets a unique, increasing build number.
      - name: Build signed release APK
        run: |
          flutter build apk --release \
            --flavor ${{ steps.flavor.outputs.name }} \
            --target ${{ steps.flavor.outputs.target }} \
            --build-number="$GITHUB_RUN_NUMBER"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: acits-${{ steps.flavor.outputs.name }}-release
          path: build/app/outputs/flutter-apk/app-${{ steps.flavor.outputs.name }}-release.apk
          if-no-files-found: error
          retention-days: 14

  build-ios:
    name: Build iOS (unsigned release)
    needs: [lint, analyse, test]
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      # Full checkout for ios/ (Xcode project, Podfile, etc.) — the workspace
      # artifact only carries lib/test/pubspec.lock, not the whole tree.
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/, test/ and resolved pubspec.lock so
      # this build uses the exact same generated code as lint/analyse/test.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      # dev on PR, prod on a tag.
      - name: Select flavor
        id: flavor
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=dev"   >> "$GITHUB_OUTPUT"
            echo "target=test/dev/main.dart" >> "$GITHUB_OUTPUT"
          else
            echo "name=prod"  >> "$GITHUB_OUTPUT"
            echo "target=lib/main.dart" >> "$GITHUB_OUTPUT"
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # SPM-capable plugins build via Swift Package Manager; the rest stay on
      # CocoaPods (hybrid). The flag is a machine setting, not a repo file.
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager

      # Cache SPM's downloaded binary artifacts (Firebase etc.) across runs.
      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Per-flavor Firebase plists (gitignored) — materialise both from their
      # *.example templates, then override with the real secrets if configured.
      # The Xcode `flutterfire bundle-service-file` build phase picks the right
      # one by build configuration (Debug/Release/Profile-{dev,prod}).
      - name: Provision Firebase config
        env:
          GOOGLE_SERVICE_INFO_DEV: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DEV }}
          GOOGLE_SERVICE_INFO_PROD: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_PROD }}
        run: |
          cp ios/flavors/dev/GoogleService-Info.plist.example ios/flavors/dev/GoogleService-Info.plist
          cp ios/flavors/prod/GoogleService-Info.plist.example ios/flavors/prod/GoogleService-Info.plist
          if [ -n "$GOOGLE_SERVICE_INFO_DEV" ]; then
            echo "$GOOGLE_SERVICE_INFO_DEV" | base64 --decode > ios/flavors/dev/GoogleService-Info.plist
          fi
          if [ -n "$GOOGLE_SERVICE_INFO_PROD" ]; then
            echo "$GOOGLE_SERVICE_INFO_PROD" | base64 --decode > ios/flavors/prod/GoogleService-Info.plist
          fi

      # The iOS build's flutterfire bundle-service-file build phase needs the
      # flutterfire CLI on PATH to copy the right plist into the .app.
      - name: Install flutterfire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      # Unsigned release build (no paid Apple Developer Program for signing).
      # --build-number matches the Android build so both artifacts from one run
      # carry the same unique build number.
      - name: Build iOS (release, no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --flavor ${{ steps.flavor.outputs.name }} \
            --target ${{ steps.flavor.outputs.target }} \
            --build-number="$GITHUB_RUN_NUMBER"

      - name: Package .app
        run: |
          APP_PATH=$(find build/ios -name '*.app' -type d | head -1)
          test -n "$APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -ry "$GITHUB_WORKSPACE/Runner-${{ steps.flavor.outputs.name }}.app.zip" "$(basename "$APP_PATH")"

      - uses: actions/upload-artifact@v7
        with:
          name: acits-${{ steps.flavor.outputs.name }}-ios
          path: Runner-${{ steps.flavor.outputs.name }}.app.zip
          if-no-files-found: error
          retention-days: 14

  ##### build web (push to develop + manual dispatch) #####
  # Deploys the dev web build to GitHub Pages so every merge into develop
  # refreshes a browsable developer PWA (dev-0 stand) without a separate server.
  # Runs on push-to-develop (not from the PR context) because the github-pages
  # environment only permits deploys from the develop branch. Depends only on
  # prepare (for the codegen workspace artifact) — the merged PR already passed
  # lint/analyse/test, so they are not re-run here. workflow_dispatch redeploys
  # Pages on demand.
  build-web:
    name: Build & deploy web (GitHub Pages)
    needs: [prepare]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/develop')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Exposed so notify can put the live PWA URL in the Telegram message.
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Full checkout for web/ (index.html, manifest.json, icons).
      - uses: actions/checkout@v7

      # Overlay prepare's generated lib/, test/ and resolved pubspec.lock so
      # this build uses the exact same generated code as lint/analyse/test.
      - uses: actions/download-artifact@v8
        with:
          name: workspace

      - run: tar -xzf workspace.tar.gz

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Firebase config is gitignored; materialise it from the committed
      # *.example template, then override with the real secret if configured.
      - name: Provision Firebase config
        env:
          GOOGLE_SERVICES_PROD: ${{ secrets.GOOGLE_SERVICES_JSON_PROD }}
        run: |
          cp android/app/src/prod/google-services.json.example android/app/src/prod/google-services.json
          if [ -n "$GOOGLE_SERVICES_PROD" ]; then
            echo "$GOOGLE_SERVICES_PROD" | base64 --decode > android/app/src/prod/google-services.json
          fi

      # dev flavor (test/dev/main.dart) — the GitHub Pages PWA is a developer
      # build: it talks to the dev-0 stand (test accounts live there; prod and
      # stage reject the github.io origin the same way — the backend CORS
      # allowlist has only acits.ru) and keeps the floating debug button, so
      # the environment can be switched right in the browser.
      # CORS_PROXY_BASE wraps every API/file URL in a public CORS proxy —
      # a TEMPORARY workaround until the backend adds the Pages origin to its
      # allowlist (see "CORS для web-PWA" in the release checklist / docs).
      # --base-href matches the Pages project path
      # (https://<owner>.github.io/<repo>/) so asset/router URLs resolve
      # correctly when served from a subpath instead of the domain root.
      - name: Build web (dev)
        run: |
          flutter build web -t test/dev/main.dart --release \
            --dart-define=CORS_PROXY_BASE=https://proxy.cors.sh/ \
            --build-number="$GITHUB_RUN_NUMBER" \
            --base-href "/${GITHUB_REPOSITORY#*/}/"

      - uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  ##### release (tags only) #####
  # Publishes the GitHub Release: attaches the signed prod APK built above and
  # writes release notes from CHANGELOG.md. Pushing a tag is the whole release
  # process — no manual release-page editing.
  release:
    name: Publish GitHub Release
    needs: [build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: acits-prod-release
          path: release-assets

      # Release notes are an extract of CHANGELOG.md, nothing invented here:
      # take the section for this tag's version, keep only the "- " bullet
      # lines (drop the ### Added/Changed/Fixed subheadings), no emoji, no
      # generated commentary.
      - name: Extract changelog section
        id: changelog
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          notes=$(awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "([+ ]|\\])" { found=1; next }
            found && /^## \[/ { exit }
            found && /^- / { print }
          ' CHANGELOG.md)

          if [ -z "$notes" ]; then
            echo "No CHANGELOG.md section found for version $tag" >&2
            exit 1
          fi

          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-assets/app-prod-release.apk \
            --title "$GITHUB_REF_NAME" \
            --notes "$NOTES"

  ##### notify #####
  # Runs on every trigger — PR, tag push, and manual workflow_dispatch — so
  # every pipeline run gets a Telegram notification.
  notify:
    name: Notify Telegram
    needs: [prepare, lint, analyse, test, build-android, build-ios, build-web, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 8

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          RESULT_PREPARE: ${{ needs.prepare.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_ANALYSE: ${{ needs.analyse.result }}
          RESULT_TEST: ${{ needs.test.result }}
          RESULT_ANDROID: ${{ needs.build-android.result }}
          RESULT_IOS: ${{ needs.build-ios.result }}
          RESULT_WEB: ${{ needs.build-web.result }}
          RESULT_RELEASE: ${{ needs.release.result }}
          PWA_URL: ${{ needs.build-web.outputs.page_url }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured — skipping notification."
            exit 0
          fi

          # Version name from pubspec.yaml + the actual build number this run
          # stamped onto the APK/IPA (flutter build ... --build-number="$GITHUB_RUN_NUMBER"),
          # not the stale +N suffix committed in pubspec.yaml.
          version_name=$(grep -E '^version:' pubspec.yaml | sed -E 's/version: *([0-9.]+)\+.*/\1/')
          version="${version_name}+${GITHUB_RUN_NUMBER}"
          # GITHUB_REF is refs/pull/<n>/merge on a PR — not useful as a label
          # — so build the ref line from event context instead.
          if [ "$EVENT_NAME" = "pull_request" ]; then
            ref="PR #$PR_NUMBER ($HEAD_REF -> $BASE_REF)"
          else
            ref="${GITHUB_REF#refs/tags/}"
            ref="${ref#refs/heads/}"
          fi
          short_sha="${GITHUB_SHA:0:8}"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          # Plain text on purpose: commit subjects are arbitrary user text and
          # can contain unpaired *"/`_` characters, which breaks Telegram's
          # Markdown entity parser and silently drops the whole message
          # (sendMessage replies 400 "can't parse entities"). No parse_mode
          # avoids that failure mode entirely.
          changelog=$(git log -8 --pretty=format:'- %ad %an | %s' --date=short)

          # Every stage is conditionally gated (PR vs push-develop vs tag), so
          # "skipped" is an expected result, not a failure — only
          # "failure"/"cancelled" turns this red. prepare always runs, so it
          # must be a hard success.
          is_bad() { [ "$1" = "failure" ] || [ "$1" = "cancelled" ]; }
          if [ "$RESULT_PREPARE" = "success" ] && \
             ! is_bad "$RESULT_LINT" && ! is_bad "$RESULT_ANALYSE" && \
             ! is_bad "$RESULT_TEST" && ! is_bad "$RESULT_ANDROID" && \
             ! is_bad "$RESULT_IOS" && ! is_bad "$RESULT_WEB" && \
             ! is_bad "$RESULT_RELEASE"; then
            status_line="✅ Build succeeded"
          else
            status_line="❌ Build failed (prepare: $RESULT_PREPARE, lint: $RESULT_LINT, analyse: $RESULT_ANALYSE, test: $RESULT_TEST, android: $RESULT_ANDROID, ios: $RESULT_IOS, web: $RESULT_WEB, release: $RESULT_RELEASE)"
          fi

          # On a successful web deploy, add the live PWA URL — same slot the
          # mobile builds imply the APK/IPA artifact in. Empty when web is
          # skipped (PR/tag runs), so the line is omitted then.
          pwa_line=""
          if [ "$RESULT_WEB" = "success" ] && [ -n "$PWA_URL" ]; then
            pwa_line=$(printf '\nPWA: %s' "$PWA_URL")
          fi

          text=$(printf '%s\nacits_flutter v%s\nRef: %s\nCommit: %s\nRun: %s%s\n\nChangelog:\n%s' \
            "$status_line" "$version" "$ref" "$short_sha" "$run_url" "$pwa_line" "$changelog")

          response=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${text}")
          echo "$response"
          echo "$response" | grep -q '"ok":true' || { echo "Telegram API call failed"; exit 1; }
