name: "Feature Request"
description: "Suggest an idea or enhancement for the app"
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement to acits_flutter!
        Please describe your idea below. Acits is free software for tracking animals inside an animal shelter (https://acits.ru/).
  - type: textarea
    id: problem
    attributes:
      label: "Problem / motivation"
      description: "What problem are you trying to solve? Why is this feature needed?"
      placeholder: "Describe the pain point or motivation behind this request."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution"
      description: "Describe the solution you'd like to see."
      placeholder: "A clear and concise description of what you want to happen."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "Describe any alternative solutions or features you've considered."
      placeholder: "A clear and concise description of any alternative solutions or workarounds."
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: "Affected area"
      description: "Which part of the app does this feature request relate to?"
      options:
        - Animals
        - Prescriptions
        - Calendar
        - Applicants
        - Curators
        - Documents
        - Auth
        - Onboarding
        - Search
        - Personal
        - Comments
        - Other
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: "Additional context"
      description: "Add any other context, mockups, or screenshots about the feature request here."
      placeholder: "Links, screenshots, or references."
    validations:
      required: false
