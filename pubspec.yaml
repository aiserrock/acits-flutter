name: acits_flutter
description: Flutter client for https://acits.ru/

publish_to: "none"

version: 0.9.0+23

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: 3.44.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  app_links: ^7.0.0
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0
  chopper: ^8.5.1
  collection: ^1.19.0
  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  equatable: ^2.0.8
  file_picker: ^11.0.2
  firebase_core: ^4.7.0
  flutter_bloc: ^9.1.1
  flutter_keyboard_visibility: ^6.0.0
  flutter_secure_storage: ^10.0.0
  flutter_slidable: ^4.0.3
  flutter_svg: ^2.2.4
  formz: ^0.8.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  image: ^4.8.0
  image_picker: ^1.2.1
  injectable: ^3.0.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  lottie: ^3.3.3
  mask_text_input_formatter: ^2.9.0
  open_filex: ^4.7.0
  path_provider: ^2.1.5
  # pdf viewer (native_pdf_view was renamed to pdfx)
  pdfx: ^2.9.2
  provider: ^6.1.5
  rxdart: ^0.28.0
  # Share content via the OS share sheet (ACTION_SEND)
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  stream_transform: ^2.1.1
  url_launcher: ^6.3.2
  # Прямой доступ к браузерным API (Web Share / скачивание blob) в web-реализации
  # DocExporter. Только под web (conditional import).
  web: ^1.1.0
  easy_localization: ^3.0.8
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3

  # In-app логи: Talker + экран логов (dev debug-меню) и BLoC-observer.
  # talker_dio_logger НЕ нужен — основной клиент chopper (сетевой логгер —
  # свой chopper-интерцептор в test/dev/).
  talker_flutter: ^5.1.16
  talker_bloc_logger: ^5.1.17

  # Alice — in-app HTTP-инспектор (как в a large production app). Chopper подключается
  # через кастомный интерцептор (addHttpCall), Dio — через getDioInterceptor.
  # Открывается из dev debug-меню (showInspector). Только dev-трафик.
  flutter_alice: 2.0.1
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  bloc_test: ^10.0.0
  build_runner: ^2.13.1
  chopper_generator: ^8.6.1
  flutter_gen_runner: ^5.14.0
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  http: ^1.6.0
  injectable_generator: ^3.0.2
  json_serializable: ^6.13.1
  logging: ^1.3.0
  mocktail: ^1.0.5
  patrol: ^4.6.1
  swagger_dart_code_generator: ^4.1.1

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/image/
    - assets/icon/
    - assets/onboarding/
    - assets/common/
    - assets/lottie/
    - assets/cert/
    - assets/gallery/

  fonts:
    - family: icomoon
      fonts:
        - asset: assets/font/icomoon.ttf

flutter_gen:
  line_length: 120
  integrations:
    flutter_svg: true
  assets:
    inputs:
      - assets/image/
      - assets/icon/
      - assets/onboarding/
      - assets/common/
      - assets/lottie/
      - assets/gallery/

# Patrol integration/e2e tests (industry-standard native UI automation).
# Tests live in integration_test/. Run with: patrol test --flavor dev
patrol:
  app_name: ACITS
  android:
    package_name: ru.acits.dev
  ios:
    bundle_id: ru.acits.dev
