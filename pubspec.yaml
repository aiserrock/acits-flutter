name: acits_flutter
description: Flutter client for https://acits.ru/

publish_to: "none"

version: 0.0.8+8

environment:
  sdk: ">=2.15.1 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2

  get_it: 7.2.0

  injectable: 1.5.0

  chopper: ^4.0.1

  json_annotation: ^4.1.0

  flutter_svg: 1.0.0

  intl: 0.17.0

  smooth_page_indicator: 1.0.0+2

  flutter_keyboard_visibility: 5.1.0

  shimmer: 2.0.0

  flutter_slidable: 1.2.0

  firebase_core: 1.10.6

  provider: ^6.0.2

  lottie: ^1.2.1

  shared_preferences: ^2.0.0

  image_picker: ^0.8.5

  rxdart: 0.27.3

  image: 3.1.3

  file_picker: 4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.0

  injectable_generator: 1.5.0

  chopper_generator: ^4.0.2

  json_serializable: ^5.0.0

  swagger_dart_code_generator: 2.2.10

  flutter_gen_runner: 4.1.3

  flutter_native_splash: 1.3.2

  build_runner: 2.1.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/image/
    - assets/icon/
    - assets/onboarding/
    - assets/common/
    - assets/lottie/
    - assets/gallery/

  fonts:
    - family: icomoon
      fonts:
        - asset: assets/font/icomoon.ttf

flutter_gen:
  integrations:
    flutter_svg: true

flutter_intl:
  enabled: true
  localizely:
    project_id: 6d9c91e7-5307-4fce-808b-eb812e21d1fa
  class_name: StringRes
