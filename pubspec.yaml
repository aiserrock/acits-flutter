name: acits_flutter
description: Flutter client for https://acits.ru/

publish_to: "none"

version: 0.3.0+17

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: 3.44.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.9

  get_it: ^9.2.1

  injectable: ^2.7.1

  dio: ^5.9.2

  chopper: ^8.5.1

  json_annotation: ^4.11.0

  flutter_svg: ^2.2.4

  intl: ^0.20.2

  smooth_page_indicator: ^2.0.1

  flutter_keyboard_visibility: ^6.0.0

  shimmer: ^3.0.0

  flutter_slidable: ^4.0.3

  firebase_core: ^4.7.0

  provider: ^6.1.5

  lottie: ^3.3.3

  shared_preferences: ^2.5.5

  image_picker: ^1.2.1

  rxdart: ^0.28.0

  image: ^4.8.0

  file_picker: ^8.3.2

  url_launcher: ^6.3.2

  path_provider: ^2.1.5

  flutter_web_browser: ^0.17.3

  open_filex: ^4.7.0

  flutter_secure_storage: ^10.0.0

  mask_text_input_formatter: ^2.9.0

  app_links: ^7.0.0

  # pdf viewer (native_pdf_view renamed to pdfx)
  pdfx: ^2.9.2

  # Поделиться контентом (ACTION_SEND)
  share_plus: ^10.1.4

  bloc: ^9.2.0

  bloc_concurrency: ^0.3.0

  stream_transform: ^2.1.1

  flutter_bloc: ^9.1.1

  equatable: ^2.0.8

  formz: ^0.8.0

  collection: ^1.19.0
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  injectable_generator: ^2.12.1

  chopper_generator: ^8.6.1

  json_serializable: ^6.13.1

  swagger_dart_code_generator: ^4.1.1

  flutter_gen_runner: ^5.14.0

  flutter_native_splash: ^2.4.7

  build_runner: ^2.13.1

  # TODO(upgrade-3.41): flutter_gherkin 3.0.0-rc.17 depends on analyzer <5.0,
  # incompatible with Dart 3.11 / analyzer 8+. Вернуть, когда появится совместимая
  # стабильная версия. Интеграционные тесты в test/integration_test/ временно
  # не запускаются — исходники оставлены как есть.
  # flutter_gherkin: 3.0.0-rc.17

  intl_utils: ^2.8.14

  logging: ^1.3.0

  http: ^1.6.0
  mocktail: ^1.0.5
  bloc_test: ^10.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/image/
    - assets/icon/
    - assets/onboarding/
    - assets/common/
    - assets/lottie/
    - assets/cert/
    - assets/gallery/

  fonts:
    - family: icomoon
      fonts:
        - asset: assets/font/icomoon.ttf

flutter_gen:
  line_length: 100
  integrations:
    flutter_svg: true
  assets:
    inputs:
      - assets/image/
      - assets/icon/
      - assets/onboarding/
      - assets/common/
      - assets/lottie/
      - assets/gallery/

flutter_intl:
  main_locale: en
  line_length: 100
  enabled: true
  localizely:
    project_id: 6d9c91e7-5307-4fce-808b-eb812e21d1fa
  class_name: StringRes
