<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Acits</title>
  <!--
    SPA-fallback for static hosts without server-side rewrite (GitHub Pages).
    With the path URL strategy a direct link like /animal/42 hits a file that
    doesn't exist -> 404. GitHub Pages serves this 404.html, which rewrites the
    requested path into a query string and redirects to index.html; a small
    script in index.html restores it. On a real nginx (try_files ... /index.html)
    this file is never used. Based on rafgraph/spa-github-pages.
  -->
  <script>
    // segmentCount = number of leading path segments to keep as-is (the repo
    // sub-path on Pages, e.g. /acits-flutter/). On a domain root (own server) 0.
    var segmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
