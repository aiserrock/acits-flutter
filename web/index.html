<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- viewport-fit=cover: обязательно для standalone-PWA на iOS, иначе Safari
       не отдаёт env(safe-area-inset-*), Flutter получает viewPadding.bottom=0
       и BottomNavigationBar залезает под home-indicator. С этим meta Scaffold
       сам добавляет нижний отступ по системной safe-area. -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Acits</title>
  <meta name="description"
    content="Работаете в приюте для животных? Acits - ваш бесплатный помощник! Заботиться о животных стало проще.">

  <!-- Restores the real path after the 404.html SPA-fallback redirect (see
       404.html). Must run before Flutter's router reads the URL. No-op on a
       server with proper rewrite (nginx try_files) — the ?/ marker never appears. -->
  <script>
    (function () {
      var l = window.location;
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash);
      }
    })();
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Acits">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Preload the main bundle so download starts during HTML parse, not after
       service-worker registration (that path added ~4s of dead wait). -->
  <link rel="preload" href="main.dart.js" as="script">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

  <meta name="theme-color" content="#6776E0" />
  <meta name="keywords" content="Заботиться о животных, Acits">


  <!-- OpenGraph -->
  <meta property="og:title" content="Acits - ваш бесплатный помощник! Заботиться о животных стало проще">
  <meta property="og:image" content="icons/og_image.png" />
  <meta property="og:image:width" content="500" />
  <meta property="og:image:height" content="372" />
  <meta property="og:description"
    content="Работаете в приюте для животных? Acits - ваш бесплатный помощник! Заботиться о животных стало проще.">
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dev-acits.web.app" />

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="splash/style.css">

  <!-- iOS PWA safe-area: Flutter web-движок НЕ читает env(safe-area-inset),
       поэтому поджимаем его хост-элементы через CSS напрямую. Flutter в
       standalone растягивает flutter-view / flt-glass-pane на весь экран
       (position: absolute; top/bottom: 0) — перекрывая home-indicator.
       Заставляем их заканчиваться над системной полоской. !important нужен:
       Flutter выставляет inline-стили при инициализации. -->
  <style>
    body { background: #6776E0; }
    flutter-view,
    flt-glass-pane,
    flt-scene-host,
    #flutter_host {
      bottom: env(safe-area-inset-bottom, 0px) !important;
      height: calc(100% - env(safe-area-inset-bottom, 0px)) !important;
    }
  </style>
</head>

<body
  style="position: fixed; inset: 0px; overflow: hidden; padding: 0px; margin: 0px; background: #6776E0; user-select: none; touch-action: none; font: 14px sans-serif; color: red;">
  <!-- Loader shown over the splash until Flutter paints its first frame (which
       removes #splash). Pure CSS so it appears instantly, before any script. -->
  <style>
    #loader {
      position: fixed;
      left: 50%;
      bottom: 18%;
      transform: translateX(-50%);
      width: 42px;
      height: 42px;
      border: 4px solid rgba(255, 255, 255, 0.35);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: loader-spin 0.9s linear infinite;
    }
    @keyframes loader-spin { to { transform: translateX(-50%) rotate(360deg); } }
  </style>

  <!-- Load main.dart.js immediately: download starts now instead of waiting on
       service-worker registration. The SW is registered in parallel below and
       only powers offline/repeat visits, not the first paint. -->
  <script src="main.dart.js" type="application/javascript"></script>
  <script>
    // Register the service worker after load, without blocking the app boot.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }
  </script>

  <script>
    // iOS PWA safe-area: Flutter web игнорит env(safe-area-inset) и растягивает
    // flutter-view на весь экран, перекрывая home-indicator. CSS-правила выше
    // Flutter может переписать inline-стилями при инициализации, поэтому
    // дожимаем програмно: измеряем реальный inset (через невидимый пробник с
    // env()) и применяем padding-bottom к flutter-view, повторяя на каждую
    // мутацию DOM (Flutter создаёт/перестраивает view уже после загрузки).
    (function () {
      var probe = document.createElement('div');
      probe.style.cssText =
        'position:fixed;left:0;bottom:0;width:0;height:env(safe-area-inset-bottom,0px);pointer-events:none;';
      document.documentElement.appendChild(probe);

      function inset() {
        return probe.getBoundingClientRect().height || 0;
      }

      function apply() {
        var pad = inset();
        if (pad <= 0) return;
        var views = document.querySelectorAll('flutter-view, flt-glass-pane, #flutter_host');
        views.forEach(function (v) {
          v.style.setProperty('bottom', pad + 'px', 'important');
          v.style.setProperty('height', 'calc(100% - ' + pad + 'px)', 'important');
        });
      }

      var obs = new MutationObserver(apply);
      obs.observe(document.body, { childList: true, subtree: true });
      window.addEventListener('resize', apply);
      window.addEventListener('orientationchange', apply);
      // Первичный прогон + несколько отложенных (Flutter доинициализирует view).
      apply();
      [200, 600, 1200, 2500].forEach(function (t) { setTimeout(apply, t); });
    })();
  </script>

  <picture id="splash">
    <source
      srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x"
      media="(prefers-color-scheme: light) or (prefers-color-scheme: no-preference)">
    <source
      srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x"
      media="(prefers-color-scheme: dark)">
    <img class="center" aria-hidden="true" src="splash/img/light-1x.png" />
  </picture>
  <div id="loader" aria-hidden="true"></div>
</body>

</html>
