plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    // END: FlutterFire Configuration
    // kotlin-android убран — приложение использует built-in Kotlin
    // (android.builtInKotlin=true), Kotlin конфигурится через kotlin{}-блок ниже.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "2"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "0.0.2"
}

apply from: "../keystore/signingConfigs.gradle"

android {
    namespace "ru.acits"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lintOptions {
        checkReleaseBuilds false
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "ru.acits"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        multiDexEnabled true
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // Только ARM: arm64-v8a (64-бит, все актуальные устройства) и
        // armeabi-v7a (32-бит, старые). x86/x86_64 (эмуляторы, ChromeOS)
        // исключены — уменьшает размер APK/AAB. Действует на dev и prod.
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release

            firebaseCrashlytics {
                // NDK-символы нативных крашей. minifyEnabled off → mapping не нужен.
                nativeSymbolUploadEnabled true
                mappingFileUploadEnabled false
            }
        }
    }

    flavorDimensions "release_type"

    productFlavors {
        dev {
            dimension "release_type"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            resValue "string", "app_name", "Acits dev"
        }

        prod {
            dimension "release_type"
            resValue "string", "app_name", "Acits"
        }
    }
}

flutter {
    source "../.."
}

// Built-in Kotlin: конфиг компилятора вместо снятого kotlinOptions{}.
kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7"
    implementation "androidx.multidex:multidex:2.0.1"
}
